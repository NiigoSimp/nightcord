<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Management - Nightcord Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        /* ONLY 5 COLORS */
        :root { 
            --primary: #884499; 
            --secondary-1: #BB5688; 
            --secondary-2: #8888CC; 
            --accent-1: #CCAA88; 
            --accent-2: #DDAACC; 
            --border-color: #eaeaea; 
        }
        body { background: #f2f2f2; font-family: 'Inter', sans-serif; }
        .main-nav { background: white; border-bottom: 1px solid var(--border-color); padding: 0.5rem 0; }
        .logo { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary-1)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .admin-container { max-width: 800px; margin: 40px auto; }
        .admin-card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid var(--border-color); }
        .form-control, .form-select { border: 1px solid var(--border-color); border-radius: 10px; padding: 10px 15px; }
        
        /* Button using primary color */
        .btn-primary { 
            background: var(--primary); 
            border-color: var(--primary); 
        }
        .btn-primary:hover { 
            background: #6a3677; 
            border-color: #6a3677; 
        }
        
        /* Danger button using secondary-1 */
        .btn-danger {
            background: var(--secondary-1);
            border-color: var(--secondary-1);
        }
        .btn-danger:hover {
            background: #9a456e;
            border-color: #9a456e;
        }
        
        /* Exclusive badge using accent colors */
        .exclusive-badge { 
            background: var(--accent-1); 
            color: #333; 
            padding: 2px 10px; 
            border-radius: 20px; 
            font-size: 0.8rem; 
        }
        
        /* Story preview styles using only 5 colors */
        .story-preview { 
            background: #f8f9fa; 
            border-radius: 10px; 
            padding: 15px; 
            margin-bottom: 15px; 
            border-left: 4px solid var(--primary); 
        }
        .story-preview-exclusive { 
            border-left-color: var(--accent-1); 
        }
        
        /* Exclusive badge in list */
        .exclusive-story-badge {
            background: var(--accent-1);
            color: #333;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            margin-left: 8px;
            display: inline-block;
        }
        
        /* Logout button using secondary-1 */
        .btn-outline-danger {
            border-color: var(--secondary-1);
            color: var(--secondary-1);
        }
        .btn-outline-danger:hover {
            background: var(--secondary-1);
            color: white;
        }
        
        /* Auth visibility */
        .admin-only {
            display: none !important;
        }
        .logout-btn {
            display: none !important;
        }
        .login-btn {
            display: inline-block !important;
        }
        body.logged-in .login-btn {
            display: none !important;
        }
        body.logged-in .logout-btn {
            display: inline-block !important;
        }
        body.role-admin .admin-only {
            display: inline-block !important;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg main-nav sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="assets/img/logo.png" height="40" class="me-2" onerror="this.style.display='none'">
                <span class="logo">Nightcord Admin</span>
            </a>
            <div class="ms-auto">
                <button class="btn btn-outline-danger login-btn" onclick="openLoginModal()" style="display: inline-block;">
                    <i class="fas fa-sign-in-alt me-2"></i>Login
                </button>
                <button class="btn btn-outline-danger logout-btn" onclick="logout()" style="display: none;">
                    <i class="fas fa-sign-out-alt me-2"></i>Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="container admin-container">
        <div class="admin-card">
            <h2 class="mb-4" style="color: var(--primary);"><i class="fas fa-plus-circle me-2"></i>Add new story</h2>
            <form id="addStoryForm">
                <div class="row">
                    <div class="col-md-6 mb-3"><label class="form-label">Story title *</label><input type="text" class="form-control" id="title" required></div>
                    <div class="col-md-6 mb-3"><label class="form-label">Author *</label><input type="text" class="form-control" id="author" required></div>
                </div>
                <div class="mb-3"><label class="form-label">Description *</label><textarea class="form-control" id="description" rows="3" required></textarea></div>
                <div class="row">
                    <div class="col-md-4 mb-3"><label class="form-label">Genre</label><select class="form-select" id="genre"><option>Romance</option><option>Fluff</option><option>Angst</option></select></div>
                    <div class="col-md-4 mb-3"><label class="form-label">Number of chapters</label><input type="number" class="form-control" id="chapters" value="1"></div>
                    <div class="col-md-4 mb-3"><label class="form-label">Rating</label><input type="number" class="form-control" id="rating" step="0.1" value="4.5"></div>
                </div>
                <div class="mb-3"><label class="form-label">Cover image URL</label><input type="text" class="form-control" id="coverImage" placeholder="assets/img/placeholder.png"></div>
                <div class="mb-3 form-check"><input type="checkbox" class="form-check-input" id="exclusive"><label class="form-check-label"><span class="exclusive-badge">Exclusive by Nightcord</span> - Story only available at Nightcord</label></div>
                <button type="button" class="btn btn-primary w-100" onclick="addNewStory()"><i class="fas fa-save me-2"></i>Add story</button>
            </form>
        </div>

        <div class="admin-card mt-4">
            <h3 class="mb-3" style="color: var(--primary);"><i class="fas fa-list me-2"></i>Existing stories list</h3>
            <div id="storiesList"></div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast" role="alert">
            <div class="toast-header" id="toastHeader">
                <i class="fas fa-info-circle me-2" id="toastIcon"></i>
                <strong class="me-auto" id="toastTitle">Notification</strong>
                <small>just now</small>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toastMessage"></div>
        </div>
    </div>

    <!-- Login Modal -->
    <div class="modal fade" id="loginModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header" style="background: linear-gradient(135deg, var(--primary), var(--secondary-1));">
                    <h5 class="modal-title text-white"><i class="fas fa-sign-in-alt me-2"></i>Login to Nightcord</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Email address</label>
                            <input type="email" class="form-control" id="loginEmail" placeholder="Enter your email" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" id="loginPassword" placeholder="Enter your password" required>
                        </div>
                        <div class="alert alert-info small">
                            <strong>Demo Accounts:</strong><br>
                            Admin: niigo@nightcord.com / niigo25<br>
                            User: hkzi@nightcord.com / hkzi25
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="handleLogin()">Login</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        let currentUser = null;
        
        function updateUIForAuth() {
            const user = localStorage.getItem('currentUser');
            if (user) {
                currentUser = JSON.parse(user);
                $('.login-btn').hide();
                $('.logout-btn').show();
                if (currentUser.role === 'admin') {
                    document.body.classList.add('role-admin');
                } else {
                    document.body.classList.remove('role-admin');
                    // Non-admin users should not be on admin page
                    window.location.href = 'index.html';
                }
                document.body.classList.add('logged-in');
            } else {
                currentUser = null;
                $('.login-btn').show();
                $('.logout-btn').hide();
                document.body.classList.remove('logged-in', 'role-admin');
                // Not logged in, redirect to home
                window.location.href = 'index.html';
            }
        }
        
        function openLoginModal() {
            $('#loginModal').modal('show');
        }
        
        function handleLogin() {
            const email = $('#loginEmail').val();
            const password = $('#loginPassword').val();
            
            if (!email || !password) {
                alert('Please enter both email and password!');
                return;
            }
            
            const result = login(email, password);
            
            if (result.success) {
                $('#loginModal').modal('hide');
                updateUIForAuth();
                showToast('success', `Welcome back, ${result.user.name}!`);
                setTimeout(() => location.reload(), 500);
            } else {
                alert(result.message);
            }
        }
        
        function logout() { 
            localStorage.removeItem('currentUser'); 
            window.location.href = 'index.html'; 
        }
        
        function showToast(type, message) {
            const toast = new bootstrap.Toast($('#liveToast')[0]);
            if (type === 'success') {
                $('#toastHeader').css('background', 'var(--secondary-2)');
                $('#toastIcon').removeClass().addClass('fas fa-check-circle me-2 text-white');
                $('#toastTitle').text('Success');
            } else if (type === 'warning') {
                $('#toastHeader').css('background', 'var(--secondary-1)');
                $('#toastIcon').removeClass().addClass('fas fa-trash me-2 text-white');
                $('#toastTitle').text('Warning');
            } else {
                $('#toastHeader').css('background', 'var(--primary)');
                $('#toastIcon').removeClass().addClass('fas fa-info-circle me-2 text-white');
                $('#toastTitle').text('Notification');
            }
            $('#toastMessage').text(message);
            toast.show();
        }
        
        // PAGE PROTECTION - MUST BE AT THE BEGINNING
        function protectAdminPage() {
            const user = localStorage.getItem('currentUser');
            if (!user) {
                window.location.href = 'index.html';
                return false;
            }
            const userData = JSON.parse(user);
            if (userData.role !== 'admin') {
                window.location.href = 'index.html';
                return false;
            }
            return true;
        }
        
        function addNewStory() {
            const title = $('#title').val().trim();
            const author = $('#author').val().trim();
            const description = $('#description').val().trim();
            
            if (!title || !author || !description) { 
                alert('Please fill in all required information!'); 
                return; 
            }
            
            const story = {
                id: Date.now().toString(),
                title: title,
                author: author,
                description: description,
                genre: $('#genre').val(),
                chapters: parseInt($('#chapters').val()) || 1,
                rating: parseFloat($('#rating').val()) || 4.5,
                coverImage: $('#coverImage').val() || 'assets/img/placeholder.png',
                exclusive: $('#exclusive').is(':checked'),
                userCreated: false,
                createdAt: new Date().toISOString(),
                publishDate: new Date().toISOString().split('T')[0],
                status: 'Ongoing',
                priority: 'Medium',
                content: `Chapter 1: Introduction\n\nThis is the content of story "${title}".\n\nAdd detailed content here.`
            };
            
            StoryService.addStory(story);
            showToast('success', 'Story added successfully!');
            $('#addStoryForm')[0].reset();
            $('#exclusive').prop('checked', false);
            loadStoriesList();
        }
        
        function deleteStory(id) { 
            if(confirm('Are you sure you want to delete this story?')){ 
                StoryService.deleteStory(id); 
                loadStoriesList(); 
                showToast('warning', 'Story deleted!');
            } 
        }
        
        function loadStoriesList() {
            const stories = StoryService.getAllStories();
            let html = '';
            if (stories.length === 0) {
                html = '<p class="text-center">No stories yet</p>';
            } else {
                stories.forEach(s => {
                    const borderColor = s.exclusive ? 'var(--accent-1)' : 'var(--primary)';
                    html += `<div class="story-preview ${s.exclusive ? 'story-preview-exclusive' : ''}" style="background: #f8f9fa; border-radius: 10px; padding: 15px; margin-bottom: 15px; border-left: 4px solid ${borderColor};">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <strong>${escapeHtml(s.title)}</strong> 
                                        <small class="text-muted">by ${escapeHtml(s.author)}</small> 
                                        ${s.exclusive ? '<span class="exclusive-story-badge">Nightcord Exclusive</span>' : ''}
                                    </div>
                                    <button class="btn btn-sm btn-danger" onclick="deleteStory('${s.id}')"><i class="fas fa-trash"></i></button>
                                </div>
                                <div class="mt-2"><small>${s.genre} | ${s.chapters} chap | ★ ${s.rating}</small></div>
                            </div>`;
                });
            }
            $('#storiesList').html(html);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        $(document).ready(() => {
            // Protect page - redirect if not admin
            if (!protectAdminPage()) return;
            
            updateUIForAuth();
            loadStoriesList();
        });
    </script>
</body>
</html>
