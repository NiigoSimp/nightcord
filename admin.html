<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý truyện - Nightcord Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <style>
        :root { --primary: #884499; --secondary-1: #BB5688; --secondary-2: #8888CC; --accent-1: #CCAA88; --accent-2: #DDAACC; --border-color: #eaeaea; }
        body { background: #f2f2f2; font-family: 'Inter', sans-serif; }
        .main-nav { background: white; border-bottom: 1px solid var(--border-color); padding: 0.5rem 0; }
        .logo { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary-1)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .admin-container { max-width: 800px; margin: 40px auto; }
        .admin-card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid var(--border-color); }
        .form-control, .form-select { border: 1px solid var(--border-color); border-radius: 10px; padding: 10px 15px; }
        .btn-primary { background: var(--primary); border-color: var(--primary); }
        .exclusive-badge { background: #FF8C00; color: white; padding: 2px 10px; border-radius: 20px; font-size: 0.8rem; }
        .story-preview { background: #f8f9fa; border-radius: 10px; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--primary); }
        .story-preview-exclusive { border-left-color: #FF8C00; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg main-nav sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html"><img src="assets/img/logo.png" height="40" class="me-2" onerror="this.style.display='none'"><span class="logo">Nightcord Admin</span></a>
            <div class="ms-auto"><button class="btn btn-outline-danger" onclick="logout()">Đăng xuất</button></div>
        </div>
    </nav>

    <div class="container admin-container">
        <div class="admin-card">
            <h2 class="mb-4" style="color: var(--primary);"><i class="fas fa-plus-circle me-2"></i>Thêm truyện mới</h2>
            <form id="addStoryForm">
                <div class="row">
                    <div class="col-md-6 mb-3"><label class="form-label">Tên truyện *</label><input type="text" class="form-control" id="title" required></div>
                    <div class="col-md-6 mb-3"><label class="form-label">Tác giả *</label><input type="text" class="form-control" id="author" required></div>
                </div>
                <div class="mb-3"><label class="form-label">Mô tả *</label><textarea class="form-control" id="description" rows="3" required></textarea></div>
                <div class="row">
                    <div class="col-md-4 mb-3"><label class="form-label">Thể loại</label><select class="form-select" id="genre"><option>Romance</option><option>Fluff</option><option>Angst</option></select></div>
                    <div class="col-md-4 mb-3"><label class="form-label">Số chương</label><input type="number" class="form-control" id="chapters" value="1"></div>
                    <div class="col-md-4 mb-3"><label class="form-label">Đánh giá</label><input type="number" class="form-control" id="rating" step="0.1" value="4.5"></div>
                </div>
                <div class="mb-3"><label class="form-label">Ảnh bìa URL</label><input type="text" class="form-control" id="coverImage" placeholder="assets/img/placeholder.png"></div>
                <div class="mb-3 form-check"><input type="checkbox" class="form-check-input" id="exclusive"><label class="form-check-label"><span class="exclusive-badge">Độc quyền bởi Nightcord</span> - Truyện chỉ có tại Nightcord</label></div>
                <button type="button" class="btn btn-primary w-100" onclick="addNewStory()"><i class="fas fa-save me-2"></i>Thêm truyện</button>
            </form>
        </div>

        <div class="admin-card mt-4">
            <h3 class="mb-3" style="color: var(--primary);"><i class="fas fa-list me-2"></i>Danh sách truyện hiện có</h3>
            <div id="storiesList"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="assets/js/storage.js"></script>
    <script>
        function initAuth() {
            const user = localStorage.getItem('currentUser');
            if (!user) window.location.href = 'index.html';
            else {
                const userData = JSON.parse(user);
                if (userData.role !== 'admin') window.location.href = 'index.html';
            }
        }
        
        function logout() { localStorage.removeItem('currentUser'); window.location.href = 'index.html'; }
        
        function addNewStory() {
            const title = $('#title').val().trim();
            const author = $('#author').val().trim();
            const description = $('#description').val().trim();
            
            if (!title || !author || !description) { 
                alert('Vui lòng điền đầy đủ thông tin!'); 
                return; 
            }
            
            const story = {
                id: Date.now().toString(),
                title: title,
                author: author,
                description: description,
                genre: $('#genre').val(),
                chapters: parseInt($('#chapters').val()) || 1,
                rating: parseFloat($('#rating').val()) || 4.5,
                coverImage: $('#coverImage').val() || 'assets/img/placeholder.png',
                exclusive: $('#exclusive').is(':checked'),
                createdAt: new Date().toISOString(),
                content: `Chương 1: Mở đầu\n\nĐây là nội dung truyện "${title}".\n\nHãy thêm nội dung chi tiết tại đây.`
            };
            
            StoryService.addStory(story);
            alert('Thêm truyện thành công!');
            $('#addStoryForm')[0].reset();
            $('#exclusive').prop('checked', false);
            loadStoriesList();
        }
        
        function deleteStory(id) { 
            if(confirm('Bạn có chắc muốn xóa truyện này?')){ 
                StoryService.deleteStory(id); 
                loadStoriesList(); 
                alert('Đã xóa truyện!');
            } 
        }
        
        function loadStoriesList() {
            const stories = StoryService.getAllStories();
            let html = '';
            if (stories.length === 0) {
                html = '<p class="text-center">Chưa có truyện nào</p>';
            } else {
                stories.forEach(s => {
                    html += `<div class="story-preview ${s.exclusive ? 'story-preview-exclusive' : ''}" style="background: #f8f9fa; border-radius: 10px; padding: 15px; margin-bottom: 15px; border-left: 4px solid ${s.exclusive ? '#FF8C00' : '#884499'};">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <strong>${s.title}</strong> 
                                        <small class="text-muted">by ${s.author}</small> 
                                        ${s.exclusive ? '<span style="background:#FF8C00; color:white; padding:2px 8px; border-radius:12px; font-size:0.7rem; margin-left:8px;">Độc quyền Nightcord</span>' : ''}
                                    </div>
                                    <button class="btn btn-sm btn-danger" onclick="deleteStory('${s.id}')"><i class="fas fa-trash"></i></button>
                                </div>
                                <div class="mt-2"><small>${s.genre} | ${s.chapters} chap | ★ ${s.rating}</small></div>
                            </div>`;
                });
            }
            $('#storiesList').html(html);
        }
        
        $(document).ready(()=>{ initAuth(); loadStoriesList(); });
    </script>
</body>
</html>
