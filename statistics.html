<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thống kê - Nightcord</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        :root { --primary: #884499; --secondary-1: #BB5688; --border-color: #eaeaea; }
        body { background: #f2f2f2; font-family: 'Inter', sans-serif; }
        .main-nav { background: white; border-bottom: 1px solid var(--border-color); padding: 0.5rem 0; }
        .logo { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary-1)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-card { background: white; border-radius: 16px; padding: 20px; text-align: center; border: 1px solid var(--border-color); transition: all 0.3s; margin-bottom: 20px; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .stat-number { font-size: 2.5rem; font-weight: 800; color: var(--primary); }
        .stat-label { color: #666; margin-top: 5px; }
        .chart-container { background: white; border-radius: 16px; padding: 20px; margin-top: 30px; border: 1px solid var(--border-color); }
        @media (max-width: 768px) { .stat-number { font-size: 1.8rem; } }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg main-nav sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="assets/img/logo.png" height="40" class="me-2" onerror="this.style.display='none'">
                <span class="logo">Nightcord Admin</span>
            </a>
            <div class="ms-auto"><button class="btn btn-outline-danger" onclick="logout()">Đăng xuất</button></div>
        </div>
    </nav>

    <main class="container my-4">
        <h2 class="mb-4" style="color: var(--primary);"><i class="fas fa-chart-bar me-2"></i>Thống kê kho truyện</h2>
        
        <div class="row g-4">
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-number" id="totalStories">0</div>
                    <div class="stat-label">Tổng số truyện</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-number" id="totalChapters">0</div>
                    <div class="stat-label">Tổng số chương</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-number" id="exclusiveStories">0</div>
                    <div class="stat-label">Độc quyền Nightcord</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-number" id="userStories">0</div>
                    <div class="stat-label">Truyện người dùng</div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-md-6">
                <div class="chart-container">
                    <h5 class="mb-3">Phân bố theo thể loại</h5>
                    <canvas id="genreChart" style="height: 300px;"></canvas>
                </div>
            </div>
            <div class="col-md-6">
                <div class="chart-container">
                    <h5 class="mb-3">Phân bố theo nguồn</h5>
                    <canvas id="sourceChart" style="height: 300px;"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="assets/js/storage.js"></script>
    <script>
        function logout() { localStorage.removeItem('currentUser'); window.location.href = 'index.html'; }
        
        function initAuth() {
            const user = localStorage.getItem('currentUser');
            if (!user) window.location.href = 'index.html';
            else {
                const userData = JSON.parse(user);
                if (userData.role !== 'admin') window.location.href = 'index.html';
            }
        }
        
        function loadStats() {
            const stories = StoryService.getAllStories();
            const total = stories.length;
            const totalChapters = stories.reduce((sum, s) => sum + (s.chapters || 0), 0);
            const exclusive = stories.filter(s => s.exclusive === true).length;
            const userStories = stories.filter(s => s.userCreated === true).length;
            
            $('#totalStories').text(total);
            $('#totalChapters').text(totalChapters);
            $('#exclusiveStories').text(exclusive);
            $('#userStories').text(userStories);
            
            // Biểu đồ thể loại
            const genreCount = { Romance: 0, Fluff: 0, Angst: 0 };
            stories.forEach(s => { if (genreCount[s.genre] !== undefined) genreCount[s.genre]++; });
            
            new Chart(document.getElementById('genreChart'), {
                type: 'doughnut',
                data: { 
                    labels: ['Romance', 'Fluff', 'Angst'], 
                    datasets: [{ 
                        data: [genreCount.Romance, genreCount.Fluff, genreCount.Angst], 
                        backgroundColor: ['#884499', '#BB5688', '#8888CC'] 
                    }] 
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
            });
            
            // Biểu đồ nguồn
            const exclusiveCount = stories.filter(s => s.exclusive === true).length;
            const normalCount = stories.filter(s => !s.exclusive && !s.userCreated).length;
            const userCount = stories.filter(s => s.userCreated === true).length;
            
            new Chart(document.getElementById('sourceChart'), {
                type: 'pie',
                data: { 
                    labels: ['Độc quyền Nightcord', 'Truyện mặc định', 'Truyện người dùng'], 
                    datasets: [{ 
                        data: [exclusiveCount, normalCount, userCount], 
                        backgroundColor: ['#FF8C00', '#884499', '#BB5688'] 
                    }] 
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
            });
        }
        
        $(document).ready(() => { initAuth(); loadStats(); });
    </script>
</body>
</html>
