<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho truyện - Nightcord Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        :root { --primary: #884499; --secondary-1: #BB5688; --border-color: #eaeaea; }
        body { background: #f2f2f2; font-family: 'Inter', sans-serif; }
        .main-nav { background: white; border-bottom: 1px solid var(--border-color); padding: 0.5rem 0; }
        .logo { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary-1)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .story-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.03); transition: all 0.3s ease; border: 1px solid var(--border-color); height: 100%; cursor: pointer; margin-bottom: 20px; }
        .story-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(136, 68, 153, 0.1); border-color: var(--secondary-2); }
        .story-cover { position: relative; aspect-ratio: 3/4; overflow: hidden; }
        .story-cover img { width: 100%; height: 100%; object-fit: cover; }
        .story-badge { position: absolute; top: 10px; left: 10px; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; color: white; z-index: 2; }
        .badge-romance { background: var(--primary); }
        .badge-fluff { background: var(--secondary-1); }
        .badge-angst { background: var(--secondary-2); }
        .badge-exclusive { background: #FF8C00; }
        .story-info { padding: 15px; }
        .story-title { font-weight: 700; font-size: 1rem; margin-bottom: 5px; color: #333; }
        .story-creator { font-size: 0.8rem; color: #888; margin-bottom: 8px; }
        .story-meta { display: flex; align-items: center; gap: 10px; font-size: 0.75rem; flex-wrap: wrap; }
        .story-rating { color: #FFB800; font-weight: 600; }
        .story-chapters { color: #888; }
        .story-exclusive { font-size: 0.7rem; background: #FF8C00; color: white; padding: 2px 8px; border-radius: 12px; }
        .filter-section { background: white; border-radius: 16px; padding: 20px; margin-bottom: 30px; border: 1px solid var(--border-color); }
        .btn-primary { background: var(--primary); border-color: var(--primary); }
        .admin-card { background: white; border-radius: 20px; padding: 30px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid var(--border-color); }
        @media (max-width: 768px) { .filter-section .row > div { margin-bottom: 15px; } }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg main-nav sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html"><img src="assets/img/logo.png" height="40" class="me-2"><span class="logo">Nightcord Admin</span></a>
            <div class="ms-auto"><button class="btn btn-outline-danger" onclick="logout()">Đăng xuất</button></div>
        </div>
    </nav>

    <main class="container my-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 style="color: var(--primary);"><i class="fas fa-books me-2"></i>Kho truyện Nightcord</h2>
        </div>

        <!-- Form thêm truyện độc quyền -->
        <div class="admin-card">
            <h4 class="mb-3" style="color: #FF8C00;"><i class="fas fa-crown me-2"></i>Thêm truyện độc quyền Nightcord</h4>
            <form id="adminStoryForm">
                <div class="row">
                    <div class="col-md-6 mb-3"><label class="form-label">Tên truyện *</label><input type="text" class="form-control" id="adminTitle" required></div>
                    <div class="col-md-6 mb-3"><label class="form-label">Tác giả *</label><input type="text" class="form-control" id="adminAuthor" required></div>
                </div>
                <div class="mb-3"><label class="form-label">Mô tả *</label><textarea class="form-control" id="adminDescription" rows="2" required></textarea></div>
                <div class="row">
                    <div class="col-md-4 mb-3"><label class="form-label">Thể loại</label><select class="form-select" id="adminGenre"><option>Romance</option><option>Fluff</option><option>Angst</option></select></div>
                    <div class="col-md-4 mb-3"><label class="form-label">Số chương</label><input type="number" class="form-control" id="adminChapters" value="1"></div>
                    <div class="col-md-4 mb-3"><label class="form-label">Đánh giá</label><input type="number" class="form-control" id="adminRating" step="0.1" value="4.5"></div>
                </div>
                <div class="mb-3"><label class="form-label">Ảnh bìa URL</label><input type="text" class="form-control" id="adminCover" placeholder="assets/img/placeholder.png"></div>
                <div class="mb-3"><label class="form-label">Nội dung truyện *</label><textarea class="form-control" id="adminContent" rows="4" required></textarea></div>
                <button type="button" class="btn btn-primary" onclick="addExclusiveStory()"><i class="fas fa-save me-2"></i>Thêm truyện độc quyền</button>
            </form>
        </div>

        <!-- Filter và danh sách truyện -->
        <div class="filter-section">
            <div class="row g-3">
                <div class="col-md-4"><label class="form-label fw-bold">🔍 Tìm kiếm</label><input type="text" class="form-control" id="searchInput" placeholder="Tên truyện, tác giả..."></div>
                <div class="col-md-3"><label class="form-label fw-bold">📚 Thể loại</label><select class="form-select" id="filterGenre"><option value="all">Tất cả</option><option value="Romance">Romance</option><option value="Fluff">Fluff</option><option value="Angst">Angst</option></select></div>
                <div class="col-md-3"><label class="form-label fw-bold">🏷️ Nguồn</label><select class="form-select" id="filterSource"><option value="all">Tất cả</option><option value="exclusive">Độc quyền Nightcord</option><option value="default">Truyện mặc định</option><option value="user">Truyện người dùng</option></select></div>
                <div class="col-md-2 d-flex align-items-end"><button class="btn btn-outline-secondary w-100" onclick="clearFilters()">Xóa lọc</button></div>
            </div>
        </div>

        <div id="storiesContainer" class="row g-4"></div>
        <div id="emptyState" class="text-center py-5" style="display:none;"><img src="assets/img/empty.svg" style="max-width: 150px;"><h4 class="mt-3">Không tìm thấy truyện</h4></div>
        <div class="d-flex justify-content-between align-items-center mt-4"><div><span id="showingInfo"></span></div><nav><ul class="pagination" id="pagination"></ul></nav></div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/storage.js"></script>
    <script>
        let currentStories = [], filteredStories = [], currentPage = 1, itemsPerPage = 8;
        
        function initAuth() {
            const user = localStorage.getItem('currentUser');
            if (!user) window.location.href = 'index.html';
            else {
                const userData = JSON.parse(user);
                if (userData.role !== 'admin') window.location.href = 'index.html';
            }
        }
        
        function logout() { localStorage.removeItem('currentUser'); window.location.href = 'index.html'; }
        function openStory(id) { window.location.href = `story.html?id=${id}`; }
        
        function addExclusiveStory() {
            const title = $('#adminTitle').val().trim();
            const author = $('#adminAuthor').val().trim();
            const description = $('#adminDescription').val().trim();
            const content = $('#adminContent').val().trim();
            
            if (!title || !author || !description || !content) {
                alert('Vui lòng điền đầy đủ thông tin!');
                return;
            }
            
            const story = {
                id: Date.now().toString(),
                title: title,
                author: author,
                description: description,
                genre: $('#adminGenre').val(),
                chapters: parseInt($('#adminChapters').val()) || 1,
                rating: parseFloat($('#adminRating').val()) || 4.5,
                coverImage: $('#adminCover').val() || 'assets/img/placeholder.png',
                exclusive: true,
                userCreated: false,
                createdAt: new Date().toISOString(),
                content: content
            };
            
            StoryService.addStory(story);
            alert('Thêm truyện độc quyền thành công!');
            $('#adminStoryForm')[0].reset();
            loadStories();
        }
        
        function loadStories() {
            currentStories = StoryService.getAllStories();
            applyFilters();
        }
        
        function applyFilters() {
            const search = $('#searchInput').val().toLowerCase();
            const genre = $('#filterGenre').val();
            const source = $('#filterSource').val();
            
            filteredStories = currentStories.filter(s => {
                if (search && !s.title.toLowerCase().includes(search) && !s.author.toLowerCase().includes(search)) return false;
                if (genre !== 'all' && s.genre !== genre) return false;
                if (source === 'exclusive' && !s.exclusive) return false;
                if (source === 'default' && (s.exclusive || s.userCreated)) return false;
                if (source === 'user' && !s.userCreated) return false;
                return true;
            });
            currentPage = 1; 
            renderStories(); 
            updatePagination();
        }
        
        function renderStories() {
            const start = (currentPage-1)*itemsPerPage, end = start+itemsPerPage, page = filteredStories.slice(start,end);
            let html = '';
            page.forEach(s => {
                let badgeClass, badgeText;
                if (s.exclusive) { badgeClass = 'badge-exclusive'; badgeText = 'ĐỘC QUYỀN'; }
                else if (s.userCreated) { badgeClass = s.genre === 'Romance' ? 'badge-romance' : s.genre === 'Fluff' ? 'badge-fluff' : 'badge-angst'; badgeText = s.genre + ' (User)'; }
                else { badgeClass = s.genre === 'Romance' ? 'badge-romance' : s.genre === 'Fluff' ? 'badge-fluff' : 'badge-angst'; badgeText = s.genre; }
                
                html += `<div class="col-lg-3 col-md-4 col-sm-6"><div class="story-card" onclick="openStory('${s.id}')"><div class="story-cover"><span class="story-badge ${badgeClass}">${badgeText}</span><img src="${s.coverImage||'assets/img/placeholder.png'}" onerror="this.src='assets/img/placeholder.png'" alt="${s.title}"></div><div class="story-info"><h3 class="story-title">${s.title}</h3><div class="story-creator">${s.author}</div><div class="story-meta"><span class="story-rating">★ ${s.rating}</span><span class="story-chapters">${s.chapters} chap</span>${s.exclusive ? '<span class="story-exclusive">Nightcord</span>' : ''}</div></div></div></div>`;
            });
            $('#storiesContainer').html(html);
            $('#emptyState').toggle(filteredStories.length===0);
            $('#showingInfo').text(`Hiển thị ${start+1}-${Math.min(end,filteredStories.length)} của ${filteredStories.length} truyện`);
        }
        
        function updatePagination() {
            let pages = Math.ceil(filteredStories.length/itemsPerPage), html='';
            for(let i=1;i<=pages;i++) html+=`<li class="page-item ${i===currentPage?'active':''}"><a class="page-link" href="#" onclick="changePage(${i});return false;">${i}</a></li>`;
            $('#pagination').html(html);
        }
        
        function changePage(p) { currentPage=p; renderStories(); }
        function clearFilters() { $('#searchInput').val(''); $('#filterGenre').val('all'); $('#filterSource').val('all'); applyFilters(); }
        
        $(document).ready(()=>{ initAuth(); loadStories(); $('#searchInput, #filterGenre, #filterSource').on('input change', applyFilters); });
    </script>
</body>
</html>
