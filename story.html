<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Read story - Nightcord</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        :root { 
            --primary: #884499; 
            --secondary-1: #BB5688; 
            --secondary-2: #8888CC;
            --accent-1: #CCAA88;
            --accent-2: #DDAACC;
            --border-color: #eaeaea; 
        }
        body { background: #f2f2f2; font-family: 'Inter', sans-serif; }
        .main-nav { background: white; border-bottom: 1px solid var(--border-color); padding: 0.5rem 0; }
        .logo { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary-1)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .reader-container { max-width: 800px; margin: 40px auto; background: white; border-radius: 20px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .story-title { font-size: 2rem; font-weight: 800; margin-bottom: 10px; color: var(--primary); }
        .story-meta { color: #888; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color); }
        .story-content { line-height: 1.8; font-size: 1.1rem; color: #333; white-space: pre-wrap; }
        
        /* Exclusive badge using accent-1 */
        .exclusive-badge { 
            background: var(--accent-1); 
            color: #333; 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 0.8rem; 
            display: inline-block; 
            margin-left: 10px; 
        }
        
        /* User badge using secondary-1 */
        .user-badge { 
            background: var(--secondary-1); 
            color: white; 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 0.8rem; 
            display: inline-block; 
            margin-left: 10px; 
        }
        
        /* Default sample badge */
        .sample-badge {
            background: var(--secondary-2);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
            margin-left: 10px;
        }
        
        .btn-outline-secondary {
            border-color: var(--border-color);
            color: #666;
        }
        .btn-outline-secondary:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        
        /* Auth visibility */
        .admin-only {
            display: none !important;
        }
        .logout-btn {
            display: none !important;
        }
        .login-btn {
            display: inline-block !important;
        }
        body.logged-in .login-btn {
            display: none !important;
        }
        body.logged-in .logout-btn {
            display: inline-block !important;
        }
        body.role-admin .admin-only {
            display: inline-block !important;
        }
        
        @media (max-width: 768px) { 
            .reader-container { padding: 20px; } 
            .story-title { font-size: 1.5rem; } 
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg main-nav sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="assets/img/logo.png" height="40" class="me-2" onerror="this.style.display='none'">
                <span class="logo">Nightcord</span>
            </a>
            <div class="ms-auto">
                <button class="btn btn-outline-primary login-btn" onclick="openLoginModal()" style="display: inline-block;">
                    <i class="fas fa-sign-in-alt me-2"></i>Login
                </button>
                <div class="dropdown logout-btn" style="display: none;">
                    <button class="btn rounded-pill px-4" style="background: linear-gradient(135deg, var(--primary), var(--secondary-1)); border: none; color: white;" data-bs-toggle="dropdown">
                        <i class="fas fa-user-circle me-2"></i><span id="userName">Account</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#"><i class="fas fa-user me-2"></i>Profile</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item admin-only" href="tasks.html"><i class="fas fa-book me-2"></i>Story Vault</a></li>
                        <li><a class="dropdown-item admin-only" href="statistics.html"><i class="fas fa-chart-bar me-2"></i>Statistics</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container reader-container">
        <div id="storyContent"></div>
        <div class="text-center mt-4">
            <a href="index.html" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-2"></i>Back to home
            </a>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast" role="alert">
            <div class="toast-header" id="toastHeader">
                <i class="fas fa-info-circle me-2" id="toastIcon"></i>
                <strong class="me-auto" id="toastTitle">Notification</strong>
                <small>just now</small>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toastMessage"></div>
        </div>
    </div>

    <!-- Login Modal -->
    <div class="modal fade" id="loginModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header" style="background: linear-gradient(135deg, var(--primary), var(--secondary-1));">
                    <h5 class="modal-title text-white"><i class="fas fa-sign-in-alt me-2"></i>Login to Nightcord</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Email address</label>
                            <input type="email" class="form-control" id="loginEmail" placeholder="Enter your email" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" id="loginPassword" placeholder="Enter your password" required>
                        </div>
                        <div class="alert alert-info small">
                            <strong>Demo Accounts:</strong><br>
                            Admin: niigo@nightcord.com / niigo25<br>
                            User: hkzi@nightcord.com / hkzi25
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="handleLogin()">Login</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        let currentUser = null;
        
        function updateUIForAuth() {
            const user = localStorage.getItem('currentUser');
            if (user) {
                currentUser = JSON.parse(user);
                $('.login-btn').hide();
                $('.logout-btn').show();
                $('#userName').text(currentUser.name || currentUser.email);
                if (currentUser.role === 'admin') {
                    $('.admin-only').show();
                    document.body.classList.add('role-admin');
                } else {
                    $('.admin-only').hide();
                    document.body.classList.remove('role-admin');
                }
                document.body.classList.add('logged-in');
            } else {
                currentUser = null;
                $('.login-btn').show();
                $('.logout-btn').hide();
                $('.admin-only').hide();
                document.body.classList.remove('logged-in', 'role-admin');
            }
        }
        
        function openLoginModal() {
            $('#loginModal').modal('show');
        }
        
        function handleLogin() {
            const email = $('#loginEmail').val();
            const password = $('#loginPassword').val();
            
            if (!email || !password) {
                alert('Please enter both email and password!');
                return;
            }
            
            const result = login(email, password);
            
            if (result.success) {
                $('#loginModal').modal('hide');
                updateUIForAuth();
                showToast('success', `Welcome back, ${result.user.name}!`);
                setTimeout(() => location.reload(), 500);
            } else {
                alert(result.message);
            }
        }
        
        function logout() { 
            localStorage.removeItem('currentUser'); 
            location.reload(); 
        }
        
        function showToast(type, message) {
            const toast = new bootstrap.Toast($('#liveToast')[0]);
            if (type === 'success') {
                $('#toastHeader').css('background', 'var(--secondary-2)');
                $('#toastIcon').removeClass().addClass('fas fa-check-circle me-2 text-white');
                $('#toastTitle').text('Success');
            } else if (type === 'warning') {
                $('#toastHeader').css('background', 'var(--secondary-1)');
                $('#toastIcon').removeClass().addClass('fas fa-trash me-2 text-white');
                $('#toastTitle').text('Warning');
            } else {
                $('#toastHeader').css('background', 'var(--primary)');
                $('#toastIcon').removeClass().addClass('fas fa-info-circle me-2 text-white');
                $('#toastTitle').text('Notification');
            }
            $('#toastMessage').text(message);
            toast.show();
        }
        
        function getStoryId() { 
            const params = new URLSearchParams(window.location.search); 
            return params.get('id'); 
        }
        
        function loadStory() {
            const id = getStoryId();
            const story = StoryService.getStoryById(id);
            if (!story) { 
                document.getElementById('storyContent').innerHTML = '<h2 class="text-center">Story not found</h2>'; 
                return; 
            }
            
            let badge = '';
            if (story.exclusive) {
                badge = '<span class="exclusive-badge">Nightcord Exclusive</span>';
            } else if (story.userCreated) {
                badge = '<span class="user-badge">User story</span>';
            } else {
                badge = '<span class="sample-badge">Sample story</span>';
            }
            
            document.getElementById('storyContent').innerHTML = `
                <h1 class="story-title">${escapeHtml(story.title)} ${badge}</h1>
                <div class="story-meta">
                    Author: ${escapeHtml(story.author)} | 
                    Genre: ${story.genre} | 
                    ${story.chapters} chapters | 
                    ★ ${story.rating}
                </div>
                <div class="story-content">${(story.content || 'Content is being updated...').replace(/\n/g, '<br>')}</div>
            `;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        $(document).ready(function() {
            updateUIForAuth();
            loadStory();
        });
    </script>
</body>
</html>
